# _data/seo.yml - Donnees SEO consommees par les includes JSON-LD (Phase 15-16).
# Pour Phase 14, ce fichier est depose en avance. Aucun layout ne le consomme encore.

# Organisation (Pandul) - D-04
organization:
  type: "Organization"
  id: "https://pandul.fr/#organization"
  name: "Pandul"
  legal_name: "Ei Loïc Morel"
  url: "https://pandul.fr/"
  logo: "https://pandul.fr/assets/img/social-card.png"
  description: "Pandul - Pédagogie Bitcoin par Loïc Morel. Tutoriels, articles, podcasts, dictionnaire interactif de 1408 définitions et formations pour comprendre Bitcoin en profondeur."
  founding_date: "2021"
  founder_ref: "https://pandul.fr/#person-loic"  # reference Person par @id
  same_as:
    - "https://x.com/Loic_Pandul"
    - "https://github.com/LoicPandul"

# Person (Loïc Morel) - D-03
person:
  type: "Person"
  id: "https://pandul.fr/#person-loic"
  name: "Loïc Morel"
  alternate_name: "Pandul"
  url: "https://pandul.fr/a-propos/"
  image: "https://pandul.fr/assets/img/profile.png"
  job_title: "Pédagogue Bitcoin"
  knows_about:
    - "Bitcoin"
    - "Lightning Network"
    - "Cryptographie"
    - "Confidentialité numérique"
  same_as:
    - "https://x.com/Loic_Pandul"
    - "https://github.com/LoicPandul"
    - "https://www.amazon.fr/stores/Loïc-Morel/author/B0GX5ZYL9F"
  works_for_ref: "https://pandul.fr/#organization"

# Open Graph defaults - D-05
og:
  default_image: "/assets/img/social-card.png"
  default_image_width: 1200       # a verifier Phase 17 (SO-06)
  default_image_height: 630       # a verifier Phase 17 (SO-06)
  default_image_alt: "Pandul - Pédagogie Bitcoin par Loïc Morel"
  default_locale: "fr_FR"
  site_name: "Pandul"

# WebSite (Phase 15 GE-02)
website:
  type: "WebSite"
  id: "https://pandul.fr/#website"
  url: "https://pandul.fr/"
  name: "Pandul"
  in_language: "fr"
  publisher_ref: "https://pandul.fr/#organization"

# Keywords site-wide (informationnel, peu utilise par moteurs modernes mais utile pour audit)
keywords:
  - "Bitcoin"
  - "pédagogie Bitcoin"
  - "dictionnaire Bitcoin"
  - "Lightning Network"
  - "Loïc Morel"
  - "Pandul"

# Phase 16 — description per-page pour DefinedTermSet (D-03, D-09)
# Source : dict-intro paragraph visible sur dictionnaire.md ligne 15 (variante loicizer ∈ [70, 155]).
# Mots-clés single-source : dictionnaire, open source, collaboratif, recense, vocabulaire,
# technique, Bitcoin, écosystème, disponible, gratuitement, en ligne.
# Longueur : 147 chars (cible 70-155 — SO-02 + check #5 validator Plan 02).
dictionnaire:
  description: "Un dictionnaire open source et collaboratif qui recense le vocabulaire technique de Bitcoin et de son écosystème. Disponible gratuitement en ligne."

# Phase 16 — description per-page pour AboutPage (D-03)
# Source : about-intro paragraph visible sur apropos.md ligne 21 (réutilisation verbatim).
# Longueur : 129 chars (cible 70-155). Single-source garantie (verbatim du visible).
aboutpage:
  description: "J'écris des contenus pédagogiques, techniques et éditoriaux : articles, formations et tutoriels sur Bitcoin et son environnement."
