title: "Loïc Morel - Pandul"
description: "Pandul - Pédagogie Bitcoin par Loïc Morel. Tutoriels, articles, podcasts, dictionnaire interactif de 1408 définitions et formations pour comprendre Bitcoin en profondeur."
author:
  name: "Loïc Morel"
  twitter: "Loic_Pandul"
  url: "https://pandul.fr/a-propos/"
lang: fr
timezone: Europe/Paris

# URL GitHub
url: "https://pandul.fr"
baseurl: ""

permalink: pretty

# Kramdown - proteger le contenu LaTeX ($$ delimiteurs)
kramdown:
  math_engine: mathjax
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

include:
  - ".well-known"

# Cloudflare Web Analytics (D-09 - token public by design, OK to commit)
analytics:
  cloudflare_token: "48df3ac9740c4498836e138fc869e5f1"

# Twitter Card (jekyll-seo-tag - D-02, ST-04)
twitter:
  username: "Loic_Pandul"
  card: "summary_large_image"

# Image globale par defaut (Open Graph fallback - D-05)
image: "/assets/img/social-card.png"

# Webmaster verifications (D-02, ST-04)
# GSC : verification via Domain property DNS TXT (Cloudflare), auto-propagation a la propriete URL-prefix https://pandul.fr/
# Bing : skipped Cas C (Plan 14-03b 2026-05-17) - a re-evaluer v1.3+ si besoin
# Bloc conserve pour future utilisation - empty strings = jekyll-seo-tag n'emet pas les meta tags
webmaster_verifications:
  google: ""
  bing: ""

# Metadonnees SEO
logo: "/assets/img/social-card.png"
social:
  name: "Loïc Morel - Pandul"
  links:
    - "https://x.com/Loic_Pandul"
    - "https://github.com/LoicPandul"

# Collections dictionnaire, categorie, lettre
collections:
  dictionnaire:
    output: true
    permalink: /dictionnaire/:slug/
  categorie:
    output: true
    permalink: /dictionnaire/categorie/:slug/
  lettre:
    output: true
    permalink: /dictionnaire/lettre/:slug/

# Collections par defaut
defaults:
  - scope: {path: ""}
    values:
      layout: "default"
  - scope:
      type: dictionnaire
    values:
      layout: "definition"
      sitemap:
        priority: 0.8       # definitions - levier SEO principal (D-08)
  - scope:
      type: categorie
    values:
      layout: "category"
      sitemap:
        priority: 0.7       # categories (D-08)
  - scope:
      type: lettre
    values:
      layout: "letter"
      sitemap:
        priority: 0.5       # lettres A-Z (D-08)
