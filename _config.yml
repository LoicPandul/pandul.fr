title: "Loïc Morel - Pandul"
description: "Rédacteur Bitcoin"
author: "Loïc Morel"
lang: fr
timezone: Europe/Paris

# URL GitHub
url: "https://pandul.fr"
baseurl: ""

permalink: pretty
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

include:
  - ".well-known"


# Métadonnées SEO
logo: "/assets/img/social-card.png"
social:
  name: "Loïc Morel - Pandul"
  links:
    - "https://x.com/Loic_Pandul"
    - "https://github.com/LoicPandul"

# Collection dictionnaire
collections:
  dictionnaire:
    output: true
    permalink: /dictionnaire/:slug/

# Collections par défaut
defaults:
  - scope: {path: ""}
    values:
      layout: "default"
  - scope:
      type: dictionnaire
    values:
      layout: "definition"
